<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>14Pro 實戰雷達 V7</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: cover; position: fixed; top: 0; left: 0; }
        #status-bar { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.75); padding: 12px; z-index: 100; text-align: center; border-bottom: 2px solid #0f0; }
        .badge { background: #ff0000; color: white; padding: 4px 15px; border-radius: 15px; font-weight: bold; font-size: 14px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        #gallery { position: fixed; bottom: 0; left: 0; width: 100%; height: 150px; display: flex; overflow-x: auto; background: rgba(0,0,0,0.8); z-index: 100; border-top: 1px solid #444; align-items: center; }
        .item { min-width: 150px; margin: 8px; border: 1px solid #0f0; border-radius: 6px; background: #111; flex-shrink: 0; overflow: hidden; }
        .item img { width: 100%; display: block; }
        .item .plate-info { padding: 5px; background: #0f0; color: #000; font-weight: bold; text-align: center; font-size: 16px; }

        #focus-guide { position: fixed; top: 35%; left: 10%; width: 80%; height: 25%; border: 2px solid rgba(0,255,0,0.6); border-radius: 10px; pointer-events: none; z-index: 50; box-shadow: 0 0 0 1000px rgba(0,0,0,0.3); }
        #startBtn { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); padding: 20px 40px; font-size: 20px; background: #28a745; color: white; border: none; border-radius: 50px; z-index: 1000; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <div id="focus-guide"></div>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="status-bar"><span class="badge" id="msg">等待啟動...</span></div>
    <button id="startBtn">啟動實戰掃描</button>
    <div id="gallery"></div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('msg');
        const gallery = document.getElementById('gallery');
        const startBtn = document.getElementById('startBtn');
        let worker = null;
        let lastPlate = "";

        async function initRadar() {
            startBtn.style.display = 'none';
            msg.innerText = "引擎初始化中...";
            
            worker = await Tesseract.createWorker();
            await worker.loadLanguage('eng');
            await worker.initialize('eng');
            await worker.setParameters({
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-',
                tessedit_pageseg_mode: '7', 
            });

            // 調整為 720p 以獲得更高幀率，對移動辨識更有利
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 1280, height: 720 } 
            });
            video.srcObject = stream;
            msg.innerText = "REC 正在偵測...";
            runOCR();
        }

        async function runOCR() {
            while (true) {
                // 模擬專業 App 的快速採樣
                canvas.width = 640;
                canvas.height = 360;
                
                // 【V7 修正】戶外實測濾鏡：不過度拉高對比，避免雜訊
                // 使用適度的對比與灰階即可
                ctx.filter = 'contrast(150%) brightness(100%) grayscale(100%)';
                
                // 抓取對焦框內的影像
                ctx.drawImage(video, video.videoWidth*0.1, video.videoHeight*0.35, video.videoWidth*0.8, video.videoHeight*0.25, 0, 0, 640, 360);

                const { data: { text, confidence } } = await worker.recognize(canvas);
                const plate = text.replace(/[^A-Z0-9-]/g, "").trim();

                // 信心門檻微調至 55，並檢查長度是否符合台灣車牌（5-7碼）
                if (plate.length >= 5 && plate.length <= 8 && confidence > 55 && plate !== lastPlate) {
                    lastPlate = plate;
                    
                    // 建立截圖：使用當前影片畫面（彩色）
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = 400;
                    tempCanvas.height = 225;
                    tempCanvas.getContext('2d').drawImage(video, 0, 0, 400, 225);
                    
                    addCapture(tempCanvas.toDataURL('image/jpeg', 0.7), plate);
                    if (navigator.vibrate) navigator.vibrate([50, 30]); // 雙重震動感
                }
                // 加快循環速度
                await new Promise(r => setTimeout(r, 300)); 
            }
        }

        function addCapture(imgData, plateNo) {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<img src="${imgData}"><div class="plate-info">${plateNo}</div>`;
            gallery.prepend(div);
            if (gallery.children.length > 15) gallery.removeChild(gallery.lastChild);
        }

        startBtn.onclick = initRadar;
    </script>
</body>
</html>
